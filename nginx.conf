server {
    listen 80;
    server_name inclusifund.co.uk www.inclusifund.co.uk _;
    root /usr/share/nginx/html;
    index index.html;

    # Clean URL rewrites for narrative surfaces
    location = /manifesto {
        try_files /manifesto.html =404;
    }

    location = /receipts {
        try_files /receipts.html =404;
    }

    # Default: serve files, fall back to 404 (not SPA rewrite)
    location / {
        try_files $uri $uri/ =404;
    }

    # Long-cache static assets
    location ~* \.(?:css|js|woff2?|png|jpg|jpeg|webp|svg|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
