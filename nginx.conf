# www -> apex 301 (canonical URL consolidation for SEO + AEO)
server {
    listen 80;
    server_name www.inclusifund.co.uk;
    return 301 https://inclusifund.co.uk$request_uri;
}

server {
    listen 80 default_server;
    server_name inclusifund.co.uk _;
    root /usr/share/nginx/html;
    index index.html;

    # .md files served as text/markdown for LLM crawler discovery
    location ~ \.md$ {
        default_type text/markdown;
        charset utf-8;
        add_header Cache-Control "public, max-age=300";
    }

    # llms.txt — the AEO manifest at the root
    location = /llms.txt {
        default_type text/plain;
        charset utf-8;
        add_header Cache-Control "public, max-age=300";
    }

    # Clean URL rewrites for narrative surfaces
    location = /manifesto {
        try_files /manifesto.html =404;
    }

    location = /receipts {
        try_files /receipts.html =404;
    }

    location = /pledge {
        try_files /pledge.html =404;
    }

    # InclusiNews — redirect to trailing-slash so relative asset paths resolve
    location = /macro { return 301 /macro/; }

    # InclusiNews slide decks (clean URLs, no trailing slash needed)
    location = /slides/1-the-138bn { return 301 /slides/1-the-138bn/; }
    location = /slides/2-the-squeeze { return 301 /slides/2-the-squeeze/; }
    location = /slides/3-reverse-receipts { return 301 /slides/3-reverse-receipts/; }

    # Default: serve files, fall back to 404
    location / {
        try_files $uri $uri/ =404;
    }

    # Long-cache static assets
    location ~* \.(?:css|js|woff2?|png|jpg|jpeg|webp|svg|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
